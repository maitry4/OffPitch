<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Spotify Karaoke Style Player</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-dark: rgba(255, 255, 255, 0.25);
            --text-fill: #ffffff;
            --highlight-color: #1db954; /* Spotify Green */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .track-info {
            margin-bottom: 30px;
        }

        .track-info h1 {
            color: #fff;
            font-size: 28px;
            margin: 0 0 5px 0;
        }

        .track-info p {
            font-size: 18px;
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Lyrics Scroll Container */
        .lyrics-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent 0%, white 20%, white 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 20%, white 80%, transparent 100%);
        }

        .lyrics-wrapper::-webkit-scrollbar {
            display: none;
        }

        .lyrics-content {
            padding: 40% 0;
        }

        /* Line Styling */
        .lyric-line {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.6;
            margin: 32px 0;
            transition: transform 0.3s ease, color 0.3s ease;
            transform-origin: left center;
            display: flex;
            flex-wrap: wrap;
            color: var(--text-dark);
        }

        /* Entire line lights up together since SRT lacks word-level timestamps */
        .lyric-line.active-line {
            transform: scale(1.03);
            color: var(--text-fill);
        }

        /* Footer Audio Controls Bar */
        .controls-bar {
            width: 100%;
            background-color: #121212;
            padding: 20px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
            border-top: 1px solid #222;
        }

        audio {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>

        // Helper function to turn "00:00:06,093" timestamp strings into absolute seconds
        function srtTimeToSeconds(timeString) {
            const parts = timeString.split(':');
            const secondsParts = parts[2].split(',');
            const hours = parseInt(parts[0], 10);
            const minutes = parseInt(parts[1], 10);
            const seconds = parseInt(secondsParts[0], 10);
            const milliseconds = parseInt(secondsParts[1], 10);
            
            return (hours * 3600) + (minutes * 60) + seconds + (milliseconds / 1000);
        }

        // Process data array into clean runtime objects
        const karaokeData = rawJsonData.map(item => {
            return {
                lineStart: srtTimeToSeconds(item.start),
                text: item.text
            };
        });

        const audioPlayer = document.getElementById('audioPlayer');
        const lyricsContent = document.getElementById('lyricsContent');
        const lyricsWrapper = document.getElementById('lyricsWrapper');

        // Step 1: Render structural text segments into HTML elements
        karaokeData.forEach((lineData, lineIndex) => {
            const lineElement = document.createElement('div');
            lineElement.classList.add('lyric-line');
            lineElement.setAttribute('data-line', lineIndex);
            lineElement.innerText = lineData.text;

            // Optional click handler to seek directly to the line's timestamp
            lineElement.addEventListener('click', () => {
                audioPlayer.currentTime = lineData.lineStart;
            });

            lyricsContent.appendChild(lineElement);
        });

        // Step 2: Continuous runtime audio position mapping tracking loop
        let currentLineIndex = -1;

        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;

            // Pinpoint the active rendering index segment match 
            let activeLineIndex = karaokeData.findIndex((line, index) => {
                const nextLine = karaokeData[index + 1];
                return currentTime >= line.lineStart && (!nextLine || currentTime < nextLine.lineStart);
            });

            // Adjust active focus element styles when execution track advances frames
            if (activeLineIndex !== currentLineIndex && activeLineIndex !== -1) {
                if (currentLineIndex !== -1) {
                    const prevLine = document.querySelector(`[data-line="${currentLineIndex}"]`);
                    if (prevLine) prevLine.classList.remove('active-line');
                }

                currentLineIndex = activeLineIndex;
                const activeLineElement = document.querySelector(`[data-line="${activeLineIndex}"]`);
                
                if (activeLineElement) {
                    activeLineElement.classList.add('active-line');
                    
                    // Center the focused text smoothly inside container limits
                    const wrapperHeight = lyricsWrapper.clientHeight;
                    const elementTop = activeLineElement.offsetTop;
                    const elementHeight = activeLineElement.clientHeight;
                    lyricsWrapper.scrollTop = elementTop - (wrapperHeight / 2) + (elementHeight / 2);
                }
            }
        });
